x-aws-environment: &aws-environment
  AWS_DEFAULT_REGION: eu-west-2
  AWS_REGION: eu-west-2
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN}

services:
  frontend:
    build:
      context: containers/frontend
      dockerfile: docker/dev.Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./containers/frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
      - bedrock-prompt-messager
    environment:
      <<: *aws-environment
      REACT_APP_BACKEND_API_BASE_URL: "http://localhost:8080"
      REACT_APP_COGNITO_ID: ${COGNITO_APP_CLIENT_ID}
      REACT_APP_COGNITO_USER_POOL_ID: ${COGNITO_USER_POOL_ID}
      REACT_APP_API_GATEWAY: "http://localhost:8081/call-llm"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  backend:
    build:
      context: containers/backend
      dockerfile: docker/dev.Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./containers/backend:/app
      - backend_node_modules:/app/node_modules
    environment:
      <<: *aws-environment
      COGNITO_REGION: ${AWS_REGION}
      COGNITO_USER_POOL_ID: ${COGNITO_USER_POOL_ID}
      COGNITO_APP_CLIENT_ID: ${COGNITO_APP_CLIENT_ID}
      S3_LLM_LOGS_BUCKET: ${S3_LLM_LOGS_BUCKET}
      S3_LLM_LOGS_DIRECTORY: ${S3_LLM_LOGS_DIRECTORY}
      S3_LLM_LOGS_BUCKET_ACCOUNT_ID: ${S3_LLM_LOGS_BUCKET_ACCOUNT_ID}
    healthcheck:
      test: ["CMD", "curl", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  bedrock-prompt-messager:
    build:
      context: lambdas/bedrock-prompt-messager
      dockerfile: docker/dev.Dockerfile
    ports:
      - "8081:8080"
    volumes:
      - ./lambdas/bedrock-prompt-messager:/app
      - bedrock_prompt_messager_node_modules:/app/node_modules
    environment:
      <<: *aws-environment
      env_model_id: "amazon.nova-lite-v1:0"
      env_temperature: "0.1"
      env_max_tokens: "10000"
      env_top_p: "0.5"
      env_logging_s3_bucket: ${S3_LLM_LOGS_BUCKET}
      env_logging_s3_key_prefix: ${S3_LLM_LOGS_DIRECTORY}
      env_guardrail_arn: ${GUARDRAIL_ARN}
      env_guardrail_version: ${GUARDRAIL_VERSION}
      env_logging_s3_account_id: ${S3_LLM_LOGS_BUCKET_ACCOUNT_ID}
      # FEAT_EXTENDED_ADVICE: true
    healthcheck:
      test: ["CMD", "curl", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  backend_node_modules:
  bedrock_prompt_messager_node_modules:
  frontend_node_modules:
